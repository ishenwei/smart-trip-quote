<!DOCTYPE html>
<html>
<head>
    <title>测试错误处理</title>
</head>
<body>
    <h1>测试错误处理</h1>
    <button id="test-btn" data-requirement-id="test123">测试按钮</button>
    <div id="test-message" style="margin-top: 10px; padding: 10px; border-radius: 4px; display: none;"></div>

    <script type="text/javascript">
    //<![CDATA[
    document.addEventListener("DOMContentLoaded", function() {
        const btn = document.getElementById("test-btn");
        const messageDiv = document.getElementById("test-message");
        let isSubmitting = false;
        btn.addEventListener("click", function() {
            if (isSubmitting) return;
            isSubmitting = true;
            btn.disabled = true;
            btn.style.opacity = "0.6";
            btn.innerHTML = "处理中...";
            messageDiv.style.display = "none";
            const requirementId = btn.dataset.requirementId;
            fetch("/admin/requirement/" + requirementId + "/generate-itinerary/", {
                method: "POST",
                headers: {
                    "X-CSRFToken": getCookie("csrftoken"),  
                    "Content-Type": "application/json"  
                }
            })
            .then(response => {
                console.log("Response status:", response.status);
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                return response.json();
            })
            .then(data => {
                console.log("Response data:", data);
                if (data.success) {
                    messageDiv.style.backgroundColor = "#d4edda";
                    messageDiv.style.color = "#155724";
                    messageDiv.style.border = "1px solid #c3e6cb";
                    messageDiv.innerHTML = "旅游行程规划设计中，该操作可能需要一些时间，请稍后在旅游行程规划页面查看";
                } else {
                    messageDiv.style.backgroundColor = "#f8d7da";
                    messageDiv.style.color = "#721c24";
                    messageDiv.style.border = "1px solid #f5c6cb";
                    messageDiv.innerHTML = "错误: " + (data.error || "生成行程规划失败");
                }
                messageDiv.style.display = "block";
            })
            .catch(error => {
                console.error("Error:", error);
                messageDiv.style.backgroundColor = "#f8d7da";
                messageDiv.style.color = "#721c24";
                messageDiv.style.border = "1px solid #f5c6cb";
                messageDiv.innerHTML = "网络错误: 请稍后重试";
                messageDiv.style.display = "block";
            })
            .finally(() => {
                isSubmitting = false;
                btn.disabled = false;
                btn.style.opacity = "1";
                btn.innerHTML = "测试按钮";
            });
        });
        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== "") {
                const cookies = document.cookie.split("; ");
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + "=")) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }
    });
    //]]>
    </script>
</body>
</html>
