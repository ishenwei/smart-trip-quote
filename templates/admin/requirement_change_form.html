{% extends "admin/change_form.html" %}

{% block after_related_objects %}
{{ block.super }}

{# 旅游行程规划按钮区域 #}
<div class="submit-row">
    <div style="text-align: center; display: flex; justify-content: center; gap: 15px; flex-wrap: wrap;">
        <button id="itineraryPlanBtn" type="button" class="itinerary-plan-button" onclick="triggerItineraryPlan()">
            <span style="margin-right: 6px;">🗺️</span> 旅游行程规划
        </button>
        <style>
            .itinerary-plan-button {
                display: inline-flex;
                align-items: center;
                padding: 8px 15px;
                background-color: #1a6b3a;
                color: white;
                border: none;
                border-radius: 4px;
                font-weight: 600;
                font-size: 13px;
                line-height: 1.4;
                cursor: pointer;
                transition: background-color 0.2s ease, transform 0.1s ease;
            }
            .itinerary-plan-button:hover {
                background-color: #145530;
                transform: translateY(-1px);
            }
            .itinerary-plan-button:focus {
                outline: 2px solid #1a6b3a;
                outline-offset: 2px;
            }
            .itinerary-plan-button:active {
                transform: translateY(0);
            }
            .itinerary-plan-button:disabled {
                background-color: #bdc3c7;
                cursor: not-allowed;
                transform: none;
            }
            .loading-spinner {
                display: inline-block;
                width: 12px;
                height: 12px;
                border: 2px solid #ffffff;
                border-top-color: transparent;
                border-radius: 50%;
                animation: spin 0.8s linear infinite;
                margin-right: 6px;
            }
            @keyframes spin {
                to { transform: rotate(360deg); }
            }
            .message {
                padding: 10px 15px;
                border-radius: 4px;
                margin-top: 10px;
                font-size: 13px;
            }
            .message.success {
                background-color: #d4edda;
                color: #155724;
                border: 1px solid #c3e6cb;
            }
            .message.error {
                background-color: #f8d7da;
                color: #721c24;
                border: 1px solid #f5c6cb;
            }
            .message.info {
                background-color: #d1ecf1;
                color: #0c5460;
                border: 1px solid #bee5eb;
            }
        </style>
    </div>
    <div id="itineraryPlanMessageContainer"></div>
</div>

<script>
function triggerItineraryPlan() {
    var btn = document.getElementById('itineraryPlanBtn');
    var messageContainer = document.getElementById('itineraryPlanMessageContainer');

    if (!btn || btn.disabled) {
        return;
    }

    var requirementId = '{{ original.requirement_id }}';

    if (!requirementId) {
        showMessage(messageContainer, 'error', '无法获取需求ID，请刷新页面后重试');
        return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="loading-spinner"></span>处理中...';

    showMessage(messageContainer, 'info', '正在提交行程规划请求，请稍候...');

    var url = '/admin/requirement/' + requirementId + '/generate-itinerary/';

    var controller = new AbortController();
    var timeoutId = setTimeout(function() { controller.abort(); }, 120000);

    fetch(url, {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': getCSRFToken()
        },
        credentials: 'same-origin',
        signal: controller.signal
    })
    .then(function(response) {
        clearTimeout(timeoutId);
        return response.json();
    })
    .then(function(data) {
        if (data.success) {
            showMessage(messageContainer, 'success', data.message || '旅游行程规划设计中，该操作可能需要一些时间，请稍后在旅游行程规划页面查看');
        } else {
            showMessage(messageContainer, 'error', data.error || '行程规划请求提交失败');
        }
    })
    .catch(function(error) {
        clearTimeout(timeoutId);
        console.error('Error:', error);
        if (error.name === 'AbortError') {
            showMessage(messageContainer, 'error', '请求超时（超过2分钟），请稍后在旅游行程规划页面查看结果');
        } else {
            showMessage(messageContainer, 'error', '网络错误，请检查网络连接后重试');
        }
    })
    .finally(function() {
        btn.disabled = false;
        btn.innerHTML = '<span>🗺️</span> 旅游行程规划';

        setTimeout(function() {
            hideMessage(messageContainer);
        }, 8000);
    });
}

function showMessage(container, type, text) {
    container.innerHTML = '<div class="message ' + type + '">' + text + '</div>';
    container.style.display = 'block';
}

function hideMessage(container) {
    if (container) {
        container.style.display = 'none';
    }
}

function getCSRFToken() {
    var name = 'csrftoken';
    var cookieValue = null;

    if (document.cookie && document.cookie !== '') {
        var cookies = document.cookie.split(';');
        for (var i = 0; i < cookies.length; i++) {
            var cookie = cookies[i].trim();
            if (cookie.substring(0, name.length + 1) === (name + '=')) {
                cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                break;
            }
        }
    }

    return cookieValue || '';
}
</script>

{% endblock %}
